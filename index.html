<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Mundo - Buscador</title>
    
    <!-- Enlaces para el Icono y modo App -->
    <link rel="icon" type="image/png" href="icono.png">
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4285f4">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }
        .logo {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #4285f4;
        }
        .search-container {
            width: 90%;
            max-width: 600px;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        }
        input[type="text"]:focus {
            box-shadow: 0 1px 8px rgba(32,33,36,0.4);
        }
        .buttons {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            background-color: #f8f9fa;
            color: #3c4043;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #f8f9fa;
        }
        button:hover {
            border: 1px solid #dadce0;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="logo">Tu Mundo</div>

    <div class="search-container">
        <form action="https://www.google.com/search" method="GET">
            <input type="text" name="q" placeholder="Busca en Tu Mundo..." autocomplete="off">
            <div class="buttons">
                <button type="submit">Buscar con Google</button>
            </div>
        </form>
    </div>

</body>
</html>
