<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Mundo - Explorador Natural</title>
    <style>
        :root {
            --bosque-oscuro: #1b2e1b;
            --verde-lima: #a4f235;
            --azul-glaciar: #87ceeb;
            --rosa-petalo: #ff69b4;
            --texto-suave: #e0f2f1;
        }

        body {
            background-color: var(--bosque-oscuro);
            color: var(--texto-suave);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .header h1 {
            color: var(--verde-lima);
            font-size: 3rem;
            text-shadow: 0 0 15px var(--verde-lima);
            margin-bottom: 10px;
        }

        .search-container {
            width: 90%;
            max-width: 600px;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 2px solid var(--azul-glaciar);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--rosa-petalo);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }

        .results {
            width: 90%;
            max-width: 800px;
            margin-top: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 5px solid var(--verde-lima);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            animation: fadeIn 0.5s ease;
        }

        .card h2 { color: var(--azul-glaciar); margin-top: 0; }
        
        .card img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 15px 0;
            border: 1px solid var(--rosa-petalo);
        }

        .flower-icon {
            font-size: 2rem;
            display: inline-block;
            margin: 0 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><span class="flower-icon">🌸</span>Tu Mundo<span class="flower-icon">🌿</span></h1>
        <p>Enciclopedia Autónoma de Conocimiento</p>
    </div>

    </div>

    <div id="resultsArea" class="results"></div>
