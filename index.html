<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Mundo - Experiencia Total</title>
    <style>
        /* ESTILO NEÓN ALTA VISIBILIDAD */
        html, body {
            background-color: #000000 !important;
            margin: 0; padding: 0; color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
        }

        header { border-bottom: 4px solid #FF00FF; padding: 20px; text-align: center; }
        h1 { color: #FFFF00; text-shadow: 0 0 15px #FF00FF; font-size: 32px; margin: 0; }

        .container { padding: 15px; max-width: 600px; margin: auto; }

        .card-main {
            border: 3px solid #39FF14; background-color: #050505;
            padding: 25px; border-radius: 20px; text-align: center;
            box-shadow: 0 0 15px #39FF14;
        }

        input {
            width: 100%; padding: 15px; background: #000; border: 2px solid #00FFFF;
            color: #FFFF00; border-radius: 10px; font-size: 18px; box-sizing: border-box; margin-bottom: 15px;
        }

        button {
            width: 100%; padding: 15px; background: #FF00FF; color: white;
            font-weight: bold; border: none; border-radius: 10px; font-size: 18px; cursor: pointer;
        }

        /* RESULTADOS */
        #display { display: none; margin-top: 20px; }
        
        .btn-voz { background: #39FF14; color: #000; margin-bottom: 15px; }

        .card-info {
            border-left: 5px solid #00FFFF; padding: 15px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.07); border-radius: 0 10px 10px 0;
        }

        .card-info h3 { color: #39FF14; margin: 0 0 5px 0; font-size: 17px; text-transform: uppercase; }
        .card-info p { color: #fff; line-height: 1.6; margin: 0; font-size: 16px; }

        .res-img { width: 100%; border: 3px solid #FFFF00; border-radius: 15px; margin-bottom: 15px; }

        /* VIDEOS */
        .video-container {
            width: 100%; border: 2px solid #FF00FF; border-radius: 15px;
            overflow: hidden; margin-top: 15px; box-shadow: 0 0 15px #FF00FF;
        }
    </style>
</head>
<body>

    <header>
        <h1>TU MUNDO</h1>
    </header>

    <div class="container">
        <div id="setup" class="card-main">
            <p style="color:#00FFFF; font-weight: bold;">Texto • Imágenes • Voz • Video</p>
            <input type="text" id="query" placeholder="Ej: Gatos, Luna, Pizza...">
            <button onclick="investigar()">BUSCAR TODO</button>
        </div>

        <div id="display">
            <h2 id="res-title" style="color:#FF00FF; text-align:center; font-size: 30px;"></h2>
            
            <img id="res-img" class="res-img" src="">

            <button class="btn-voz" onclick="hablar()">🔊 ESCUCHAR EXPLICACIÓN</button>
            
            <div id="texto-completo">
                <div class="card-info">
                    <h3>¿Qué es?</h3>
                    <p id="res-def"></p>
                </div>
                <div class="card-info">
                    <h3>Importancia</h3>
                    <p id="res-imp"></p>
                </div>
                <div class="card-info">
                    <h3>Dato Curioso</h3>
                    <p id="res-cur"></p>
                </div>
            </div>

            <h3 style="color:#39FF14; text-align:center;">📺 VIDEO RELACIONADO</h3>
            <div class="video-container" id="video-box"></div>

            <button onclick="location.reload()" style="background:#444; margin-top: 20px;">NUEVA BÚSQUEDA</button>
        </div>
    </div>

    <script>
        function hablar() {
            const texto = document.getElementById('texto-completo').innerText;
            const mensaje = new SpeechSynthesisUtterance(texto);
            mensaje.lang = 'es-ES';
            window.speechSynthesis.speak(mensaje);
        }

        function investigar() {
            const t = document.getElementById('query').value.toLowerCase().trim();
            if(!t) return;

            document.getElementById('setup').style.display = 'none';
            document.getElementById('display').style.display = 'block';
            document.getElementById('res-title').innerText = t.toUpperCase();
            
            // Imagen Dinámica
            document.getElementById('res-img').src = "https://loremflickr.com/600/400/" + t;

            // Video Dinámico (YouTube Search)
            document.getElementById('video-box').innerHTML = `
                <iframe width="100%" height="315" 
                src="https://www.youtube.com/embed?listType=search&list=${t}+explicacion+educativa" 
                frameborder="0" allowfullscreen></iframe>`;

            let d = "", i = "", c = "";

            // Lógica de aprendizaje
            if(t.match(/gato|perro|animal|leon/)) {
                d = "Es un ser vivo que forma parte del reino animal y el ecosistema.";
                i = "Mantienen el equilibrio natural y son compañeros del ser humano.";
                c = "Los animales tienen formas increíbles de comunicarse sin palabras.";
            } else if(t.match(/luna|espacio|sol|planeta/)) {
                d = "Es un objeto celeste que existe en el vasto universo.";
                i = "Nos enseña sobre las leyes de la física y el origen del tiempo.";
                c = "¡En el espacio el silencio es total porque no hay aire!";
            } else {
                d = "Es un tema clave que expande nuestro conocimiento en Tu Mundo.";
                i = "Aprender sobre esto nos ayuda a entender mejor la realidad.";
                c = "Tu cerebro se vuelve más fuerte cada vez que investigas algo nuevo.";
            }

            document.getElementById('res-def').innerText = d;
            document.getElementById('res-imp').innerText = i;
            document.getElementById('res-cur').innerText = c;
        }
    </script>
</body>
</html>
