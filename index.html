<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Mundo - Versión Final</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .neon-box { border: 3px solid #39FF14; padding: 20px; border-radius: 20px; background: #050505; box-shadow: 0 0 10px #39FF14; margin-bottom: 20px; }
        h1 { color: #FFFF00; text-shadow: 0 0 10px #FF00FF; margin: 10px 0; }
        input { width: 100%; padding: 15px; background: #000; border: 2px solid #00FFFF; color: #FFFF00; border-radius: 10px; font-size: 18px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; font-size: 16px; }
        .btn-buscar { background: #FF00FF; color: white; }
        .btn-voz { background: #39FF14; color: #000; }
        .btn-share { background: #25D366; color: white; }
        
        #pantalla { display: none; }
        .info-card { border-left: 4px solid #00FFFF; background: #111; padding: 15px; margin-top: 15px; text-align: left; }
        .info-card h3 { color: #39FF14; margin: 0; font-size: 14px; text-transform: uppercase; }
        .res-img { width: 100%; border-radius: 15px; border: 2px solid #FFFF00; margin-top: 15px; }
        .vid-box { width: 100%; border-radius: 15px; border: 2px solid #FF00FF; margin-top: 15px; overflow: hidden; height: 250px; }
    </style>
</head>
<body>

    <h1>TU MUNDO</h1>

    <div id="inicio" class="neon-box">
        <p style="color:#00FFFF">Investigación Multimedia</p>
        <input type="text" id="busqueda" placeholder="Ej: Gatos, Luna, Pizza...">
        <button class="btn-buscar" onclick="buscar()">INICIAR INVESTIGACIÓN</button>
    </div>

    <div id="pantalla" class="neon-box">
        <h2 id="titulo" style="color:#FF00FF; margin: 0;"></h2>
        <img id="foto" class="res-img" src="">
        
        <button class="btn-voz" onclick="hablar()">🔊 ESCUCHAR</button>
        <button class="btn-share" onclick="compartir()">📲 COMPARTIR</button>

        <div id="texto">
            <div class="info-card"><h3>¿Qué es?</h3><p id="r1"></p></div>
            <div class="info-card"><h3>Importancia</h3><p id="r2"></p></div>
            <div class="info-card"><h3>Curiosidad</h3><p id="r3"></p></div>
        </div>

        <h3 style="color:#39FF14; margin-top:20px;">📺 VIDEO</h3>
        <div id="video" class="vid-box"></div>

        <button onclick="location.reload()" style="background:#333; color:white;">NUEVA BÚSQUEDA</button>
    </div>

    <script>
        function buscar() {
            const t = document.getElementById('busqueda').value.trim();
            if(!t) return;
            document.getElementById('inicio').style.display = 'none';
            document.getElementById('pantalla').style.display = 'block';
            document.getElementById('titulo').innerText = t.toUpperCase();
            document.getElementById('foto').src = "https://loremflickr.com/500/400/" + t;
            document.getElementById('video').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed?listType=search&list=${t}+educativo" frameborder="0"></iframe>`;

            let d = "Es un tema fascinante que estamos explorando hoy en Tu Mundo.";
            let i = "Su estudio nos permite comprender mejor el entorno y la tecnología.";
            let c = "¡Tu cerebro aprende algo nuevo cada vez que haces una búsqueda!";

            if(t.toLowerCase().match(/gato|perro|animal/)) {
                d = "Es un ser vivo que ayuda al equilibrio del planeta.";
                i = "Son compañeros vitales para el ser humano.";
                c = "Los animales se comunican de formas que aún no comprendemos del todo.";
            }

            document.getElementById('r1').innerText = d;
            document.getElementById('r2').innerText = i;
            document.getElementById('r3').innerText = c;
        }

        function hablar() {
            const texto = document.getElementById('texto').innerText;
            const msj = new SpeechSynthesisUtterance(texto);
            msj.lang = 'es-ES';
            window.speechSynthesis.speak(msj);
        }

        function compartir() {
            const t = document.getElementById('titulo').innerText;
            const url = window.location.href;
            window.open(`https://api.whatsapp.com/send?text=Mira lo que aprendí sobre ${t}: ${url}`);
        }
    </script>
</body>
</html>
