<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Mundo - Buscador Independiente</title>
    <style>
        :root {
            --gradient-start: #1E5631; 
            --gradient-end: #0D3E5E; 
            --nature-fucsia: #A27BBA; 
            --nature-verde: #2ECC71; 
            --bg-color: #FDFEFE; 
            --text-color: #2F363F; 
            --card-bg: rgba(255, 255, 255, 0.98); 
        }

        [data-theme="dark"] {
            --gradient-start: #0A1C14; 
            --gradient-end: #04101A; 
            --nature-fucsia: #6B5678; 
            --nature-verde: #229954; 
            --bg-color: #0E1012; 
            --text-color: #D6DBDF; 
            --card-bg: rgba(18, 18, 18, 0.98); 
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 50px 0;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            text-align: center;
            border-bottom: 5px solid var(--nature-verde);
        }

        .logo-container h1 {
            font-size: clamp(30px, 8vw, 60px);
            margin: 0;
            color: white;
            text-shadow: 2px 2px 0px var(--nature-fucsia);
            letter-spacing: 3px;
        }

        /* Contenedor principal */
        .main-container {
            width: 90%;
            max-width: 700px;
            margin-top: -30px;
            z-index: 10;
        }

        .search-area {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 40px;
            border: 3px solid var(--nature-verde);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        .flower-icon img { width: 80px; margin-bottom: 15px; }

        .search-input {
            width: 100%;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 50px;
            border: 3px solid var(--nature-fucsia);
            outline: none;
            background: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
        }

        .tabs { margin: 20px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .tab {
            padding: 10px 20px;
            border: 2px solid var(--nature-fucsia);
            background: transparent;
            color: var(--nature-fucsia);
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .tab.active { background: var(--nature-fucsia); color: white; }

        .btn-buscar {
            background: var(--nature-verde);
            color: white;
            padding: 15px 50px;
            font-size: 22px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900;
            box-shadow: 0 6px 0px #229954;
            transition: 0.1s;
        }
        .btn-buscar:active { transform: translateY(4px); box-shadow: 0 2px 0px #229954; }

        /* SECCIÓN DE RESULTADOS */
        #results-container {
            display: none; /* Oculto al inicio */
            background: var(--card-bg);
            margin-top: 20px;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid var(--nature-fucsia);
            text-align: left;
        }

        .result-item {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .result-item h3 { color: var(--nature-verde); margin: 0; }
        .result-item p { font-size: 14px; margin: 5px 0; }
        .result-item span { color: var(--nature-fucsia); font-size: 12px; }

        .btn-volver {
            margin-top: 15px;
            background: var(--nature-fucsia);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
        }

        footer { margin-top: auto; padding: 20px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>TU MUNDO</h1>
        </div>
    </header>

    <div class="main-container">
        <div class="search-area" id="search-box">
            <div class="flower-icon">
                <img src="https://cdn-icons-png.flaticon.com/512/185/185801.png" alt="Flor">
            </div>
            <input type="text" id="user-input" class="search-input" placeholder="¿Qué descubriremos hoy?">
            
            <div class="tabs">
                <button class="tab active">TODO</button>
                <button class="tab">IMÁGENES</button>
                <button class="tab">VIDEOS</button>
            </div>

            <button class="btn-buscar" id="btn-buscar">BUSCAR</button>
        </div>

        <div id="results-container">
            <h2 style="color: var(--nature-fucsia);">Resultados para: <span id="search-term" style="color: var(--nature-verde);"></span></h2>
            <hr>
            <div id="results-list">
                </div>
            <button class="btn-volver" onclick="location.reload()">Nueva Búsqueda</button>
        </div>
    </div>

    <footer>Tu Mundo Independiente - Online 2026</footer>

    <script>
        const btnBuscar = document.getElementById('btn-buscar');
        const searchBox = document.getElementById('search-box');
        const resultsContainer = document.getElementById('results-container');
        const resultsList = document.getElementById('results-list');
        const searchTerm = document.getElementById('search-term');
        const userInput = document.getElementById('user-input');

        btnBuscar.addEventListener('click', () => {
            const query = userInput.value;
            
            if (query.trim() === "") {
                alert("Escribe algo para buscar en tu mundo 🌿");
                return;
            }

            // Simulación de proceso online
            searchBox.style.opacity = "0.5";
            btnBuscar.innerText = "Buscando...";

            setTimeout(() => {
                searchBox.style.display = "none";
                resultsContainer.style.display = "block";
                searchTerm.innerText = query;

                // Generar resultados "online" independientes
                resultsList.innerHTML = `
                    <div class="result-item">
                        <span>tu-mundo.online/naturaleza</span>
                        <h3>Descubriendo ${query} en el bosque</h3>
                        <p>Explora cómo ${query} afecta el ecosistema local y mejora la biodiversidad de nuestro entorno natural.</p>
                    </div>
                    <div class="result-item">
                        <span>tu-mundo.online/guia-verde</span>
                        <h3>Guía completa sobre ${query}</h3>
                        <p>Todo lo que necesitas saber para integrar ${query} en tu vida diaria de forma ecológica.</p>
                    </div>
                    <div class="result-item">
                        <span>tu-mundo.online/comunidad</span>
                        <h3>Lo que la gente dice de ${query}</h3>
                        <p>Nuestra comunidad online ha compartido 150 fotos nuevas sobre ${query} esta semana.</p>
                    </div>
                `;
            }, 1000);
        });
    </script>
</body>
</html>
