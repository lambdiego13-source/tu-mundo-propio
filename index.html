<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Mundo - Buscador Inteligente</title>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            background-color: #121212; /* Fondo oscuro */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #ff00ff; /* Fucsia Neón */
            text-shadow: 0 0 10px #ff00ff;
            margin-bottom: 30px;
        }

        .buscador-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border-radius: 25px;
            border: 2px solid #39FF14; /* Verde Neón */
            background-color: rgba(0,0,0,0.5);
            color: white;
            outline: none;
        }

        button {
            padding: 12px 24px;
            border-radius: 25px;
            border: none;
            background-color: #ff00ff; /* Fucsia Neón */
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h1>Tu Mundo</h1>

    <div class="buscador-container">
        <input type="text" id="inputBusqueda" placeholder="¿Qué quieres investigar hoy?">
        
        <button onclick="realizarBusqueda()">Investigar</button>
    </div>

    <div id="contenedor-fotos">
        </div>

    <script src="script.js"></script>

</body>
</html>
