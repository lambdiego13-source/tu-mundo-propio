<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Mundo - Neón Real</title>
    <style>
        /* Forzamos el fondo negro en el nivel más alto */
        html, body {
            background-color: #000000 !important;
            color: #00FFFF;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 30px;
            border-bottom: 3px solid #FF00FF;
            box-shadow: 0 0 15px #FF00FF;
        }

        h1 {
            color: #FFFF00;
            text-shadow: 2px 2px #FF00FF;
            font-size: 35px;
            margin: 0;
        }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        .search-box {
            background: #0a0a0a;
            border: 2px solid #39FF14;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 10px #39FF14;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #00FFFF;
            color: #FFFF00;
            font-size: 18px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            background: #FF00FF;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 0 10px #FF00FF;
        }

        /* Área de Resultados */
        #results {
            display: none;
            margin-top: 20px;
            border: 1px solid #00FFFF;
            padding: 15px;
            border-radius: 10px;
        }

        .section { margin-bottom: 20px; }
        .section h2 { color: #39FF14; font-size: 20px; border-bottom: 1px solid #333; }
        .section p { color: #ffffff; line-height: 1.5; }

        .img-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin-bottom: 15px;
        }

        .img-container img {
            width: 150px;
            height: 110px;
            border: 2px solid #FFFF00;
            border-radius: 5px;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <header>
        <h1>TU MUNDO</h1>
        <p style="color: #39FF14; font-size: 12px;">MODO NEÓN ACTIVADO</p>
    </header>

    <div class="container">
        <div id="search-ui" class="search-box">
            <input type="text" id="topic" placeholder="Escribe un tema...">
            <button onclick="buscar()">EXPLORAR</button>
        </div>

        <div id="results">
            <h2 id="res-title" style="color: #FF00FF; text-align: center;"></h2>
            
            <div class="img-container" id="res-imgs"></div>

            <div class="section">
                <h2>Concepto</h2>
                <p id="p-concepto"></p>
            </div>
            <div class="section">
                <h2>Importancia</h2>
                <p id="p-importancia"></p>
            </div>
            <div class="section">
                <h2>Historia</h2>
                <p id="p-historia"></p>
            </div>
            <div class="section">
                <h2>¿Sabías que?</h2>
                <p id="p-curioso"></p>
            </div>

            <button style="background: #333;" onclick="location.reload()">NUEVA BÚSQUEDA</button>
        </div>
    </div>

    <script>
        function buscar() {
            const t = document.getElementById('topic').value;
            if(!t) return alert("Escribe algo primero");

            document.getElementById('search-ui').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            document.getElementById('res-title').innerText = t.toUpperCase();

            // Fotos
            const gal = document.getElementById('res-imgs');
            gal.innerHTML = `
                <img src="https://loremflickr.com/320/240/${t}?random=1">
                <img src="https://loremflickr.com/320/240/${t}?random=2">
                <img src="https://loremflickr.com/320/240/${t}?random=3">
            `;

            // Textos
            document.getElementById('p-concepto').innerText = `${t} es un concepto clave en el mundo actual, representando innovación y desarrollo.`;
            document.getElementById('p-importancia').innerText = `La importancia de ${t} radica en cómo facilita la vida cotidiana y el avance tecnológico.`;
            document.getElementById('p-historia').innerText = `A lo largo de los años, ${t} ha evolucionado desde sus humildes comienzos hasta ser lo que vemos hoy.`;
            document.getElementById('p-curioso').innerText = `¿Sabías que muchas personas consideran que ${t} cambiará el futuro por completo?`;
        }
    </script>
</body>
</html>
