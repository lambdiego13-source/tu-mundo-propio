<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Mundo - Inventos y Ciencia</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .neon-box { border: 3px solid #39FF14; padding: 25px; border-radius: 20px; background: #050505; box-shadow: 0 0 15px #39FF14; }
        h1 { color: #FFFF00; text-shadow: 0 0 10px #FF00FF; font-size: 35px; }
        input { width: 100%; padding: 18px; background: #000; border: 2px solid #00FFFF; color: #FFFF00; border-radius: 12px; font-size: 22px; box-sizing: border-box; }
        
        button { width: 100%; padding: 18px; margin-top: 12px; border-radius: 12px; font-weight: bold; border: none; font-size: 20px; cursor: pointer; }
        .btn-buscar { background: #FF00FF; color: white; }
        .btn-voz { background: #39FF14; color: #000; }
        
        #pantalla { display: none; margin-top: 20px; }
        .info-card { border-left: 5px solid #00FFFF; background: rgba(255,255,255,0.05); padding: 20px; margin-top: 15px; text-align: left; border-radius: 0 15px 15px 0; }
