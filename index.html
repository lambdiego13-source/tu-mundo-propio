<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Mundo - Enciclopedia Neón</title>
    <style>
        /* --- ESTILOS NEÓN Y AMBIENTACIÓN --- */
        :root {
            --fucsia-neon: #ff00ff;
            --lima-neon: #39ff14;
            --cian-neon: #00ffff;
            --fondo-oscuro: #050505; /* Casi negro para máximo contraste */
        }

        body {
            background-color: var(--fondo-oscuro);
            color: #fff; /* Texto base blanco para legibilidad */
            font-family: 'Montserrat', 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        h1 {
            color: var(--fucsia-neon);
            font-size: 3.5rem;
            text-shadow: 0 0 10px var(--fucsia-neon), 0 0 20px var(--fucsia-neon);
            margin-top: 50px;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--cian-neon);
            text-shadow: 0 0 5px var(--cian-neon);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* --- BUSCADOR --- */
        .search-box {
            width: 90%;
            max-width: 600px;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 50px;
            border: 2px solid var(--lima-neon);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
        }

        input {
            flex-grow: 1;
            padding: 15px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 1.2rem;
            outline: none;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* --- BOTONES ACUÑADOS --- */
        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-explorar {
            background-color: var(--fucsia-neon);
            color: #000;
            box-shadow: 0 0 10px var(--fucsia-neon);
        }

        .btn-explorar:hover {
            box-shadow: 0 0 25px var(--fucsia-neon);
            transform: translateY(-3px);
        }

        .btn-voz {
            background-color: #333; /* Oscuro por defecto */
            color: var(--lima-neon);
            border: 2px solid var(--lima-neon);
        }

        .btn-voz:hover {
            background-color: var(--lima-neon);
            color: #000;
            box-shadow: 0 0 20px var(--lima-neon);
        }

        /* --- ÁREA DE RESULTADOS --- */
        #results-container {
            margin-top: 40px;
            width: 90%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--cian-neon);
            border-radius: 15px;
            padding: 30px;
            display: none; /* Oculto hasta buscar */
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        #res-title {
            color: var(--fucsia-neon);
            border-bottom: 2px solid var(--lima-neon);
            padding-bottom: 10px;
            margin-top: 0;
        }

        #res-meta {
            color: var(--cian-neon);
            font-style: italic;
            margin-bottom: 20px;
        }

        #res-content {
            line-height: 1.8;
            font-size: 1.1rem;
        }
