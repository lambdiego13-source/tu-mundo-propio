<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Mundo - Buscador Independiente</title>
    <style>
        :root {
            --forest-dark: #1E5631; 
            --ocean-blue: #0D3E5E; 
            --lavender: #A27BBA; 
            --leaf-green: #2ECC71; 
            --bg: #FDFEFE; 
            --text: #2F363F; 
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 50px 0;
            background: linear-gradient(135deg, var(--forest-dark), var(--ocean-blue));
            text-align: center;
            border-bottom: 5px solid var(--leaf-green);
        }

        .logo h1 {
            font-size: clamp(35px, 8vw, 65px);
            margin: 0;
            color: white;
            text-shadow: 3px 3px 0px var(--lavender);
            letter-spacing: 4px;
        }

        .main {
            width: 92%;
            max-width: 700px;
            margin: -40px auto 0;
            z-index: 5;
        }

        .search-box {
            background: white;
            padding: 30px;
            border-radius: 45px;
            border: 3px solid var(--leaf-green);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            text-align: center;
        }

        .flower-logo { width: 90px; margin-bottom: 15px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .input-style {
            width: 100%;
            padding: 16px 25px;
            font-size: 18px;
            border-radius: 50px;
            border: 3px solid var(--lavender);
            outline: none;
            box-sizing: border-box;
            color: var(--text);
        }

        .tabs { margin: 20px 0; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .tab {
            padding: 10px 18px;
            border: 2px solid var(--lavender);
            background: none;
            color: var(--lavender);
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .tab.active { background: var(--lavender); color: white; }
        .tab:active { transform: scale(0.9); }

        .btn-buscar {
            background: var(--leaf-green);
            color: white;
            padding: 16px 60px;
            font-size: 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900;
            box-shadow: 0 7px 0px #229954;
        }
        .btn-buscar:active { transform: translateY(4px); box-shadow: 0 2px 0px #229954; }

        /* --- RESULTADOS --- */
        #results-area {
            display: none;
            background: white;
            margin-top: 25px;
            padding: 25px;
            border-radius: 30px;
            border: 2px solid var(--lavender);
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .grid-item img { width: 100%; height: 140px; object-fit: cover; border-radius: 15px; }

        .news-item { margin-bottom: 15px; padding: 10px; border-left: 4px solid var(--leaf-green); background: #f9f9f9; }

        /* --- TABLA DE HISTORIAL --- */
        .history-section {
            width: 92%;
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid var(--leaf-green);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--forest-dark); color: white; padding: 10px; text-align: left; border-radius: 5px 0 0 0; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        tr:nth-child(even) { background: #f2f9f4; }

        .btn-back { width: 100%; padding: 12px; margin-top: 20px; background: var(--lavender); color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; }

        footer { margin-top: auto; padding: 25px; text-align: center; font-size: 13px; color: #7f8c8d; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><h1>TU MUNDO</h1></div>
    </header>

    <div class="main">
        <div class="search-box" id="box-ui">
            <img src="https://cdn-icons-png.flaticon.com/512/185/185801.png" class="flower-logo">
            <input type="text" id="query" class="input-style" placeholder="¿Qué descubriremos hoy?">
            
            <div class="tabs">
                <button class="tab active" onclick="setTab(this, 'todo')">TODO</button>
                <button class="tab" onclick="setTab(this, 'images')">IMÁGENES</button>
                <button class="tab" onclick="setTab(this, 'videos')">VIDEOS</button>
                <button class="tab" onclick="setTab(this, 'news')">NOTICIAS</button>
            </div>

            <button class="btn-buscar" id="go">BUSCAR</button>
        </div>

        <div id="results-area">
            <h2 id="res-title" style="color:var(--forest-dark);"></h2>
            <div id="res-content"></div>
            <button class="btn-back" onclick="location.reload()">Regresar</button>
        </div>
    </div>

    <div class="history-section">
        <h3 style="color: var(--ocean-blue); margin-top:0;">📜 Historial de Búsqueda</h3>
        <table>
            <thead>
                <tr>
                    <th>Búsqueda</th>
                    <th>Tipo</th>
                </tr>
            </thead>
            <tbody id="history-body">
                </tbody>
        </table>
    </div>

    <footer>Tu Mundo - Naturaleza & Historial 🌿</footer>

    <script>
        let currentTab = 'todo';
        let history = [];

        function setTab(el, type) {
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            currentTab = type;
        }

        const btn = document.getElementById('go');
        const box = document.getElementById('box-ui');
        const area = document.getElementById('results-area');
        const list = document.getElementById('res-content');
        const val = document.getElementById('query');
        const historyBody = document.getElementById('history-body');

        btn.addEventListener('click', () => {
            const txt = val.value.trim();
            if(!txt) return alert("Escribe algo 🌿");

            // Guardar en historial
            const newRow = `<tr><td>${txt}</td><td>${currentTab.toUpperCase()}</td></tr>`;
            historyBody.innerHTML = newRow + historyBody.innerHTML;

            box.style.display = "none";
            area.style.display = "block";
            document.getElementById('res-title').innerText = "Viendo " + currentTab + " de: " + txt;

            if(currentTab === 'todo') {
                list.innerHTML = `<div class="news-item"><h3>Información de ${txt}</h3><p>Resultados generales sobre tu búsqueda en Tu Mundo.</p></div>`;
            } 
            else if(currentTab === 'images') {
                list.innerHTML = `<div class="grid">
                    <img src="https://picsum.photos/seed/${txt}1/300/200">
                    <img src="https://picsum.photos/seed/${txt}2/300/200">
                </div>`;
            }
            else if(currentTab === 'videos') {
                list.innerHTML = `<div class="news-item"><h4>▶ Reproducir: ${txt}</h4><p>Video de alta calidad sobre el tema.</p></div>`;
            }
            else if(currentTab === 'news') {
                list.innerHTML = `
                    <div class="news-item">
                        <h4 style="margin:0; color:var(--ocean-blue)">Última hora: Novedades sobre ${txt}</h4>
                        <p style="font-size:14px">Se reportan nuevos avances y tendencias globales relacionadas con ${txt} este mediodía.</p>
                    </div>
                    <div class="news-item">
                        <h4 style="margin:0; color:var(--ocean-blue)">${txt} en la comunidad online</h4>
                        <p style="font-size:14px">Expertos analizan el impacto de ${txt} en la sociedad moderna.</p>
                    </div>`;
            }
        });
    </script>
</body>
</html>
