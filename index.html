<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Mundo Neon</title>
    <style>
        /* FONDO NEGRO TOTAL GARANTIZADO */
        body {
            background-color: #000000;
            color: #00FFFF;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* TITULO BRILLANTE */
        h1 {
            color: #FFFF00;
            text-shadow: 0 0 10px #FF00FF, 0 0 20px #FF00FF;
            font-size: 40px;
        }

        /* CAJA DE BUSQUEDA */
        .caja {
            border: 2px solid #39FF14;
            padding: 20px;
            border-radius: 15px;
            background: #050505;
            box-shadow: 0 0 15px #39FF14;
            max-width: 500px;
            margin: auto;
        }

        input {
            width: 80%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #00FFFF;
            background: #000;
            color: #fff;
            margin-bottom: 10px;
        }

        button {
            background: #FF00FF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* RESULTADOS */
        #resultado {
            display: none;
            margin-top: 20px;
            text-align: left;
            border: 1px solid #FF00FF;
            padding: 15px;
            border-radius: 10px;
        }

        h2 { color: #39FF14; border-bottom: 1px solid #333; }
        p { color: #ffffff; line-height: 1.6; }

        .fotos { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 15px; }
        .fotos img { width: 150px; border: 2px solid #FFFF00; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>TU MUNDO</h1>
    
    <div id="buscador" class="caja">
        <p style="color: #39FF14;">Investigación Neón Independiente</p>
        <input type="text" id="tema" placeholder="Escribe un tema aquí...">
        <button onclick="buscar()">EXPLORAR</button>
    </div>

    <div id="resultado" class="caja">
        <h2 id="titulo-res" style="text-align:center; color:#FF00FF;"></h2>
        
        <div class="fotos" id="galeria"></div>

        <h2>Concepto</h2>
        <p id="txt-concepto"></p>

        <h2>Importancia</h2>
        <p id="txt-importancia"></p>

        <h2>Historia</h2>
        <p id="txt-historia"></p>

        <h2>¿Sabías que?</h2>
        <p id="txt-sabias"></p>

        <button onclick="location.reload()" style="background:#333; width:100%;">VOLVER</button>
    </div>

    <script>
        function buscar() {
            const tema = document.getElementById('tema').value;
            if(!tema) return alert("Escribe algo");

            document.getElementById('buscador').style.display = 'none';
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('titulo-res').innerText = tema.toUpperCase();

            // Fotos Reales
            document.getElementById('galeria').innerHTML = `
                <img src="https://loremflickr.com/300/200/${tema}?random=1">
                <img src="https://loremflickr.com/300/200/${tema}?random=2">
            `;

            // Contenido
            document.getElementById('txt-concepto').innerText = tema + " es un tema esencial que destaca por su diseño y funcionalidad en el mundo moderno.";
            document.getElementById('txt-importancia').innerText = "Su importancia radica en el impacto positivo que genera en la sociedad y la tecnología.";
            document.getElementById('txt-historia').innerText = "A través de los años, " + tema + " ha evolucionado para adaptarse a las nuevas necesidades digitales.";
            document.getElementById('txt-sabias').innerText = "¿Sabías que " + tema + " es uno de los términos más buscados en entornos de aprendizaje independiente?";
        }
    </script>
</body>
</html>
