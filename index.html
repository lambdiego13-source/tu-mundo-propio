<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Mundo - Buscador</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="contenedor-principal">
        <header>
            <h1 class="titulo-neon">Tu Mundo</h1>
            <p class="subtitulo">Explora la Naturaleza</p>
        </header>

        <div class="busqueda-box">
            <!-- IMPORTANTE: El id debe ser 'inputBusqueda' -->
            <input type="text" id="inputBusqueda" placeholder="¿Qué quieres investigar?">
            <div class="botones-accion">
                <button id="btnBuscar">Buscar</button>
                <button id="btnVoz" title="Escuchar">🎤</button>
            </div>
        </div>

        <!-- Aquí es donde Wikipedia escribirá la información -->
        <section id="resultados" class="seccion-resultados">
            <p class="mensaje-espera">Esperando tu búsqueda...</p>
        </section>
    </div>

    <!-- El ?v=2 obliga a tu Android a cargar el script nuevo -->
    <script src="script.js?v=2"></script>
</body>
</html>
