<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Mundo - Neón Experiencia Total</title>
    <style>
        /* RESET TOTAL PARA EVITAR BLANCOS */
        * { background-color: transparent; }
        html, body { 
            background-color: #000000 !important; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        :root {
            --negro: #000000;
            --fucsia: #FF00FF;
            --cian: #00FFFF;
            --verde: #39FF14;
            --amarillo: #FFFF00;
        }

        body {
            color: var(--cian);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* CABECERA */
        header {
            width: 100%;
            padding: 40px 0;
            background-color: #000;
            border-bottom: 4px solid var(--fucsia);
            text-align: center;
            box-shadow: 0 0 30px var(--fucsia);
        }

        header h1 {
            color: var(--amarillo);
            font-size: 45px;
            text-shadow: 4px 4px var(--fucsia);
            margin: 0;
            letter-spacing: 5px;
        }

        /* CONTROLES DE MÚSICA */
        .music-player {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid var(--verde);
            border-radius: 10px;
            color: var(--verde);
            font-size: 12px;
            cursor: pointer;
        }

        /* BUSCADOR */
        .main-content {
            width: 90%;
            max-width: 650px;
            margin-top: 40px;
            background-color: #000;
        }

        .search-card {
            border: 3px solid var(--verde);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 0 20px var(--verde);
            background-color: #050505;
        }

        input {
            width: 100%;
            background: #000;
            border: 2px solid var(--cian);
            padding: 18px;
            color: var(--amarillo);
            font-size: 20px;
            border-radius: 50px;
            outline: none;
            box-sizing: border-box;
            box-shadow: inset 0 0 10px var(--cian);
        }

        button.btn-main {
            margin-top: 25px;
            background: var(--fucsia);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 0 20px var(--fucsia);
            transition: 0.3s;
        }

        button.btn-main:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* PANEL DE RESULTADOS */
        #display-results {
            display: none;
            margin-top: 20px;
            border: 2px solid var(--cian);
            padding: 30px;
            border-radius: 20px;
            background-color: #050505;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
        }

        .gallery {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .gallery img {
            width: 250px;
            height: 180px;
            border: 3px solid var(--amarillo);
            border-radius: 15px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .info-block {
            margin-bottom: 25px;
            padding-left: 15px;
            border-left: 3px solid var(--fucsia);
            background-color: transparent;
        }

        .info-block h2 { color: var(--verde); text-transform: uppercase; margin-bottom: 5px; }
